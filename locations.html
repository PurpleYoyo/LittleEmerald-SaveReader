<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Locations</title>
    <link rel="stylesheet" href="css/locations.css">
    <link rel="icon" href="smallchung.png" type="image/png">
    <script type="module" src="js/locations.js" defer></script>
</head>

<body>
    <div id="sidebar-container"></div>

    <div class="content-container">
        <h1 class="title">Little Emerald Locations</h1>
        <br>
        <input type="text" id="search-bar" list="location-suggestions" placeholder="Search Locations..." />
        <datalist id="location-suggestions"></datalist>
        <button id="search" type="button">Go</button>
        <div id="map-container">
            <canvas id="locations-map"></canvas>
        </div>
    </div>

    <div id="location-modal" class="hidden">
        <div class="modal-content">
            <span id="close-modal">&times;</span>
            
            <div id="encounter-info"></div>
            <div id="trainer-info">
                <div id="trainer-tooltip"></div>
                <canvas id="trainer-map"></canvas>
            </div>
            <div id="item-info">
                <div id="item-tooltip"></div>
                <canvas id="item-map"></canvas>
            </div>
        </div>
    </div>

    <script>
        fetch("sidebar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("sidebar-container").innerHTML = html;
        });
          
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            if (!sidebar) return;
            sidebar.style.width = sidebar.style.width === "250px" ? "0" : "250px";
        }
    </script>
</body>
</html>
