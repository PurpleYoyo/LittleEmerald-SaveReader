<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Little Emerald Pokédex</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" href="smallchung.png" type="image/png">
    <script type="module" src="js/main.js"></script>
</head>

<body>
    <div id="sidebar-container"></div>

    <div class="content-container">
        <h1 class="title">Little Emerald Pokédex</h1>
        <br>
        <input type="radio" id="pokemon" value="pokemon" name="item-selector" checked>
        <label for="pokemon">Pokémon</label>
        <input type="radio" id="moves" value="moves" name="item-selector">
        <label for="moves">Moves</label>
        <input type="radio" id="locations" value="locations" name="item-selector">
        <label for="locations">Locations</label>
        <input type="radio" id="abilities" value="abilities" name="item-selector">
        <label for="abilities">Abilities</label>

        <input type="text" id="search-bar" list="suggestions" placeholder="Search Pokémon, Moves, Locations..." />
        <datalist id="suggestions"></datalist>

        <button id="testing" type="button">Go</button>
        
        <div id="cards-container" class="grid"></div>
        <div id="map-container">
            <canvas id="locations-map"></canvas>
        </div>
    </div>

    <div id="pokemon-modal" class="hidden">
        <div class="modal-content">
            <span id="close-modal">&times;</span>

            <div id="pokedex-info"></div>
            <div id="megas-info"></div>
            <div id="learnset-info"></div>
            <div id="encounter-info"></div>
        </div>
    </div>

    <div id="move-modal" class="hidden">
        <div class="modal-content">
            <span id="close-modal">&times;</span>

            <div id="movedex-info"></div>
            <div id="learned-by-info"></div>
        </div>
    </div>

    <div id="location-modal" class="hidden">
        <div class="modal-content">
            <span id="close-modal">&times;</span>
            
            <div id="encounter-info"></div>
            <div id="trainer-info">
                <div id="trainer-tooltip"></div>
                <canvas id="trainer-map"></canvas>
                <div id="sets-info"></div>
            </div>
            <div id="item-info">
                <div id="item-tooltip"></div>
                <canvas id="item-map"></canvas>
            </div>
        </div>
    </div>

    <div id="ability-modal" class="hidden">
        <div class="modal-content">
            <span id="close-modal">&times;</span>

            <div id="ability-info"></div>
            <div id="pokemon-with-info"></div>
        </div>
    </div>

    <script>
        fetch("sidebar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("sidebar-container").innerHTML = html;
        });
          
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            if (!sidebar) return;
            sidebar.style.width = sidebar.style.width === "250px" ? "0" : "250px";
        }
    </script>
</body>
</html>
