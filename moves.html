<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movedex</title>
    <link rel="stylesheet" href="css/moves.css">
    <link rel="icon" href="smallchung.png" type="image/png">
    <script src="js/moves.js" defer></script>
</head>

<body>
    <div id="sidebar-container"></div>

    <div class="content-container">
        <h1 class="title">Little Emerald Movedex</h1>
        <br>
        <input type="text" id="search-bar" list="move-suggestions" placeholder="Search Moves..." />
        <datalist id="move-suggestions"></datalist>
        <div id="move-info">
            <details open>
                <summary>Move Data</summary>
                <table id="movedex-table">
                    <thead>
                      <tr>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Type</th>
                        <th>Base Power</th>
                        <th>Accuracy</th>
                        <th>PP</th>
                        <th>Target</th>
                        <th>Category</th>
                        <th>Priority</th>
                      </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="flags"></div>
                <div id="additional-effects"></div>
            </details>

            <details>
                <summary>Learned By</summary>
                <table id="learned-by-table">
                    <thead>
                      <tr>
                        <th>Via Level-Up</th>
                        <th>Via TM/HM</th>
                        <th>Via Egg</th>
                        <th>Via Move Tutor</th>
                      </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </details>
        </div>
    </div>

    <script>
        fetch("sidebar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("sidebar-container").innerHTML = html;
        });
          
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            if (!sidebar) return;
            sidebar.style.width = sidebar.style.width === "250px" ? "0" : "250px";
        }
    </script>
</body>
</html>
