<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movedex</title>
    <link rel="stylesheet" href="css/moves.css">
    <link rel="icon" href="smallchung.png" type="image/png">
    <script src="js/moves.js" defer></script>
</head>

<body>
    <div id="sidebar-container"></div>

    <div class="content-container">
        <h1 class="title">Little Emerald Movedex</h1>
        <br>
        <input type="text" id="search-bar" list="move-suggestions" placeholder="Search Moves..." />
        <datalist id="move-suggestions"></datalist>
        <div id="move-container" class="grid"></div>
    </div>

    <div id="move-modal" class="hidden">
        <div class="modal-content">
            <span id="close-modal">&times;</span>

            <div id="movedex-info"></div>
            <div id="learned-by-info"></div>
        </div>
    </div>

    <script>
        fetch("sidebar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("sidebar-container").innerHTML = html;
        });
          
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            if (!sidebar) return;
            sidebar.style.width = sidebar.style.width === "250px" ? "0" : "250px";
        }
    </script>
</body>
</html>
